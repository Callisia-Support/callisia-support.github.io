<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Callisia Support</title>
    <script>
        const userLang = navigator.language || navigator.userLanguage;
        const targetLang = userLang.toLowerCase().startsWith('pt') ? 'pt' : 'en';
        window.location.replace(`terms-of-service/${targetLang}/`);
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
